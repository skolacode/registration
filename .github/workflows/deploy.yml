name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate env.js from secrets
        run: |
          cat > env.js <<EOF
          window.ENV = {
            API_KEY: "${{ secrets.API_KEY }}",
            AUTH_DOMAIN: "${{ secrets.AUTH_DOMAIN }}",
            PROJECT_ID: "${{ secrets.PROJECT_ID }}",
            STORAGE_BUCKET: "${{ secrets.STORAGE_BUCKET }}",
            MESSAGING_SENDER_ID: "${{ secrets.MESSAGING_SENDER_ID }}",
            APP_ID: "${{ secrets.APP_ID }}",
            MEASUREMENT_ID: "${{ secrets.MEASUREMENT_ID }}"
          };
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Obfuscate JS for production
        run: |
          npx --yes javascript-obfuscator env.js --output env.js \
            --compact true --string-array true --string-array-encoding base64 \
            --string-array-threshold 1 --split-strings true
          npx --yes javascript-obfuscator app.js --output app.js \
            --compact true --string-array true --string-array-encoding base64 \
            --string-array-threshold 0.75

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
